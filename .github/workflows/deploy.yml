name: Deploy dashboard

on:
  workflow_dispatch:
  push:
    paths:
      - 'index.html'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Instalar StatiCrypt
        run: npm install -g staticrypt

      - name: Criptografar HTML
        run: |
          staticrypt index.html \
            --password ${{ secrets.STATICRYPT_PASSWORD }} \
            --template .staticrypt/login-template.html \
            --output encrypted/index.html

      - name: Publicar no GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./encrypted
